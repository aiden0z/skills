<!-- STATUS BADGE COMPONENT
     Colored dot + text label for showing status inline.
     Variables: {{dot_color}}, {{text_color}}, {{status_text}}

     Preset combinations:
       Normal:    dot=#22c55e text=#166534
       At Risk:   dot=#d97706 text=#92400e
       High Risk: dot=#ef4444 text=#991b1b
       Resolved:  dot=#94a3b8 text=#475569
-->
<span style="color:{{text_color}};font-size:13px;font-weight:500;white-space:nowrap;
             font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
             word-wrap:break-word;overflow-wrap:break-word;">
    <span style="color:{{dot_color}};font-size:10px;">&#9679;</span>&nbsp;{{status_text}}
</span>
