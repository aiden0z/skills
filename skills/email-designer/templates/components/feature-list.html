<!-- FEATURE LIST COMPONENT
     Vertical list of features with Unicode icons and descriptions.
     Uses table rows instead of <ul>/<ol> for Outlook compatibility.

     Uses width="100%" — wrap in a parent <td> to control max width.
     Variables:
       {{icon_color}}  — icon color (default #2563eb)
       {{text_color}}  — text color (default #475569)
       {{icon_N}}      — Unicode icon per item (e.g., ✓, →, ●, ★)
       {{title_N}}     — feature title
       {{desc_N}}      — feature description (optional)
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width:100%;border-collapse:collapse;table-layout:fixed;">
    <!-- Feature 1 -->
    <tr>
        <td width="32" valign="top" align="center"
            style="width:32px;padding:8px 0;
                   font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                   font-size:16px;color:{{icon_color}};
                   line-height:24px;mso-line-height-rule:exactly;">{{icon_1}}</td>
        <td valign="top" style="padding:8px 0 8px 8px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:14px;font-weight:600;color:#334155;
                      line-height:24px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{title_1}}</p>
            <p style="margin:4px 0 0 0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:13px;font-weight:400;color:{{text_color}};
                      line-height:20px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{desc_1}}</p>
        </td>
    </tr>
    <!-- Feature 2 -->
    <tr>
        <td width="32" valign="top" align="center"
            style="width:32px;padding:8px 0;
                   font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                   font-size:16px;color:{{icon_color}};
                   line-height:24px;mso-line-height-rule:exactly;">{{icon_2}}</td>
        <td valign="top" style="padding:8px 0 8px 8px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:14px;font-weight:600;color:#334155;
                      line-height:24px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{title_2}}</p>
            <p style="margin:4px 0 0 0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:13px;font-weight:400;color:{{text_color}};
                      line-height:20px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{desc_2}}</p>
        </td>
    </tr>
    <!-- Feature 3 -->
    <tr>
        <td width="32" valign="top" align="center"
            style="width:32px;padding:8px 0;
                   font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                   font-size:16px;color:{{icon_color}};
                   line-height:24px;mso-line-height-rule:exactly;">{{icon_3}}</td>
        <td valign="top" style="padding:8px 0 8px 8px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:14px;font-weight:600;color:#334155;
                      line-height:24px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{title_3}}</p>
            <p style="margin:4px 0 0 0;padding:0;

                      line-height:20px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{desc_3}}</p>
        </td>
    </tr>
    <!-- Repeat pattern for additional features -->
</table>
