<!-- ALERT / NOTICE COMPONENT
     Semantic alert box with 4 variants: info, success, warning, error.
     Uses colored left border (Outlook-safe via bgcolor cell) and tinted background.

     Uses width="100%" — wrap in a parent <td> to control max width.
     Variables:
       {{alert_type}}  — one of: info, success, warning, error
       {{alert_title}} — alert heading (optional)
       {{alert_text}}  — alert body

     Color map (set by agent based on alert_type):
       info:    border #3b82f6, bg #eff6ff, title #1e40af
       success: border #059669, bg #f0fdf4, title #166534
       warning: border #d97706, bg #fffbeb, title #92400e
       error:   border #dc2626, bg #fef2f2, title #991b1b
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width:100%;border-collapse:collapse;">
    <tr>
        <!-- Left accent border -->
        <td width="4" bgcolor="{{border_color}}"
            style="width:4px;background-color:{{border_color}};padding:0;
                   font-size:0;line-height:0;">
            <!--[if mso]>
            <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false"
                    style="width:4px;height:100%;">
                <v:fill type="solid" color="{{border_color}}"/>
            </v:rect>
            <![endif]-->
            <!--[if !mso]><!-->&#8203;<!--<![endif]-->
        </td>
        <!-- Content -->
        <td bgcolor="{{bg_color}}"
            style="background-color:{{bg_color}};padding:12px 16px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:14px;font-weight:600;color:{{title_color}};
                      line-height:20px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{alert_title}}</p>
            <p style="margin:4px 0 0 0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:13px;font-weight:400;color:#475569;
                      line-height:20px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{alert_text}}</p>
        </td>
    </tr>
</table>
