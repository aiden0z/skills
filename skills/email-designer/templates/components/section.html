<!-- SECTION COMPONENT
     Content section block with white background and accent-color left border (VML).
     Uses VML for the left border instead of CSS border for Outlook compatibility.
     Uses width="100%" — wrap in a parent td that controls max width.
     Variables: {{bg_color}}, {{text_color}}, {{section_title_placeholder}}, {{section_content_placeholder}}
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width: 100%; border-collapse: collapse; table-layout: fixed;"
       bgcolor="{{bg_color}}">
    <tr>
        <td bgcolor="{{bg_color}}" style="background-color: {{bg_color}}; padding: 24px 16px;">

            <!-- Section title with VML accent left border -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="border-collapse: collapse;">
                <tr>
                    <!-- Left accent border cell using VML -->
                    <td width="4" bgcolor="#2563eb"
                        style="width: 4px; background-color: #2563eb; padding: 0;">
                        <!--[if mso]>
                        <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false"
                                style="width:4px;height:100%;">
                            <v:fill type="solid" color="#2563eb"/>
                        </v:rect>
                        <![endif]-->
                        <!--[if !mso]><!-->
                        &#8203;
                        <!--<![endif]-->
                    </td>
                    <!-- Title content -->
                    <td valign="middle"
                        style="padding: 8px 0 8px 12px;
                               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;">
                        <h2 style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                                   font-size: 22px; font-weight: 600; color: {{text_color}};
                                   line-height: 30px; mso-line-height-rule: exactly;
                                   padding: 0; word-wrap: break-word; overflow-wrap: break-word;">{{section_title_placeholder}}</h2>
                    </td>
                </tr>
            </table>

            <!-- Spacer between title and content -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td height="16"
                        style="height: 16px; font-size: 1px; line-height: 16px; mso-line-height-rule: exactly;">&nbsp;</td>
                </tr>
            </table>

            <!-- Section content text -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td style="padding: 0 0 0 16px;
                               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;">
                        <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                                  font-size: 15px; font-weight: 400; color: {{text_color}};
                                  line-height: 24px; mso-line-height-rule: exactly;
                                  padding: 0; word-wrap: break-word; overflow-wrap: break-word;">{{section_content_placeholder}}</p>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>
