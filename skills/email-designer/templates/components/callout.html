<!-- CALLOUT / ACCENT BAR COMPONENT
     A highlighted block with colored left border and tinted background.
     Used for: summaries, key notes, important remarks, quotes.

     Uses width="100%" — wrap in a parent <td> to control max width.
     Variables: {{accent_color}} (default #2563eb), {{bg_tint}} (default #eff6ff),
                {{text_color}} (default #334155), {{callout_text}}

     Note: border-left works in most clients. For strict Outlook compatibility,
     use a nested table with a narrow colored <td> on the left instead.
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width:100%;border-collapse:collapse;">
    <tr>
        <!-- Accent bar (narrow colored cell — Outlook-safe alternative to border-left) -->
        <td width="4" bgcolor="{{accent_color}}"
            style="width:4px;background-color:{{accent_color}};padding:0;
                   font-size:0;line-height:0;">&nbsp;</td>
        <!-- Content -->
        <td bgcolor="{{bg_tint}}"
            style="background-color:{{bg_tint}};padding:12px 16px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
                      font-size:14px;font-weight:400;color:{{text_color}};
                      line-height:22px;mso-line-height-rule:exactly;
                      word-wrap:break-word;overflow-wrap:break-word;">{{callout_text}}</p>
        </td>
    </tr>
</table>
