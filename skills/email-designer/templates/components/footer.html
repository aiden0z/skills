<!-- FOOTER COMPONENT
     Email footer with light background, smaller text, copyright, and unsubscribe link.
     Centered alignment with 12px font size.
     Uses width="100%" — wrap in a parent td that controls max width.
     Variables: {{copyright_placeholder}}, {{unsubscribe_url}}
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width: 100%; border-collapse: collapse; table-layout: fixed;"
       bgcolor="#f1f5f9">
    <tr>
        <td align="center" valign="top" bgcolor="#f1f5f9"
            style="background-color: #f1f5f9; padding: 24px 16px;">

            <!-- Copyright text -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td align="center" valign="middle"
                        style="padding: 0;
                               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;">
                        <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                                  font-size: 12px; font-weight: 400; color: #64748b;
                                  line-height: 18px; mso-line-height-rule: exactly;
                                  padding: 0; text-align: center; word-wrap: break-word; overflow-wrap: break-word;">{{copyright_placeholder}}</p>
                    </td>
                </tr>
            </table>

            <!-- Spacer between copyright and unsubscribe -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td height="8"
                        style="height: 8px; font-size: 1px; line-height: 8px; mso-line-height-rule: exactly;">&nbsp;</td>
                </tr>
            </table>

            <!-- Unsubscribe link -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td align="center" valign="middle"
                        style="padding: 0;
                               font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;">
                        <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                                  font-size: 12px; font-weight: 400; color: #94a3b8;
                                  line-height: 18px; mso-line-height-rule: exactly;
                                  padding: 0; text-align: center; word-wrap: break-word; overflow-wrap: break-word;">
                            <a href="{{unsubscribe_url}}"
                               style="color: #64748b; text-decoration: underline;
                                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                                      font-size: 12px; word-wrap: break-word; overflow-wrap: break-word;">Unsubscribe</a>
                        </p>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>
