<!-- CTA BUTTON COMPONENT
     Outlook-safe button using table cell with bgcolor.
     Cannot use border-radius or padding-based buttons in Outlook.
     This approach works in ALL email clients.

     Variables:
       {{button_text}}  — button label (e.g., "查看详情", "Learn More")
       {{button_url}}   — link URL
       {{button_color}} — button background (e.g., #2563eb)
       {{text_color}}   — button text color (e.g., #ffffff)
       {{button_width}} — button width in px (e.g., 200)
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center">
    <tr>
        <td align="center" valign="middle" bgcolor="{{button_color}}"
            style="background-color:{{button_color}};padding:12px 32px;
                   mso-line-height-rule:exactly;">
            <!--[if mso]>
            <v:rect xmlns:v="urn:schemas-microsoft-com:vml" href="{{button_url}}"
                    style="width:{{button_width}}px;height:40px;v-text-anchor:middle;"
                    strokecolor="{{button_color}}" fillcolor="{{button_color}}">
                <v:fill type="solid" color="{{button_color}}"/>
                <v:textbox inset="0,0,0,0" style="mso-fit-shape-to-text:true;">
                    <center style="color:{{text_color}};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;font-weight:600;">
                        {{button_text}}
                    </center>
                </v:textbox>
            </v:rect>
            <![endif]-->
            <!--[if !mso]><!-->
            <a href="{{button_url}}"
               style="color:{{text_color}};font-size:14px;font-weight:600;
                      text-decoration:none;display:inline-block;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;">
                {{button_text}}
            </a>
            <!--<![endif]-->
        </td>
    </tr>
</table>
