<!-- PRICING TABLE COMPONENT
     3-column pricing comparison. Recommended plan gets a highlighted header.
     Uses percentage-based widths. Container should be ≥600px.

     Uses width="100%" — wrap in a parent <td> to control max width.
     Variables:
       {{plan_N_name}}, {{plan_N_price}}, {{plan_N_period}},
       {{plan_N_features}} (semicolon-separated list),
       {{plan_N_cta_text}}, {{plan_N_cta_url}}
       {{highlight_color}} — recommended plan header color (default #2563eb)
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width:100%;border-collapse:collapse;table-layout:fixed;">
    <tr>
        <!-- Plan 1 (standard) -->
        <td width="33%" valign="top" style="width:33%;padding:0 4px 0 0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="width:100%;border-collapse:collapse;">
                <!-- Plan header -->
                <tr>
                    <td bgcolor="#f1f5f9" align="center"
                        style="background-color:#f1f5f9;padding:16px 12px;">
                        <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:14px;font-weight:600;color:#334155;line-height:20px;mso-line-height-rule:exactly;">{{plan_1_name}}</p>
                        <p style="margin:8px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:28px;font-weight:600;color:#0f172a;line-height:36px;mso-line-height-rule:exactly;word-wrap:break-word;overflow-wrap:break-word;">{{plan_1_price}}</p>
                        <p style="margin:2px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:12px;font-weight:400;color:#64748b;line-height:16px;mso-line-height-rule:exactly;">{{plan_1_period}}</p>
                    </td>
                </tr>
                <!-- Features (use semicolons in {{plan_1_features}} to separate items) -->
                <tr>
                    <td style="padding:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;color:#475569;line-height:22px;mso-line-height-rule:exactly;">
                        {{plan_1_features}}
                    </td>
                </tr>
                <!-- CTA -->
                <tr>
                    <td align="center" style="padding:0 12px 16px 12px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td align="center" bgcolor="#f1f5f9" style="background-color:#f1f5f9;padding:8px 24px;">
                                    <a href="{{plan_1_cta_url}}" style="color:#334155;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">{{plan_1_cta_text}}</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
        <!-- Plan 2 (recommended / highlighted) -->
        <td width="34%" valign="top" style="width:34%;padding:0 2px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="width:100%;border-collapse:collapse;">
                <tr>
                    <td bgcolor="{{highlight_color}}" align="center"
                        style="background-color:{{highlight_color}};padding:16px 12px;">
                        <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:14px;font-weight:600;color:#ffffff;line-height:20px;mso-line-height-rule:exactly;">{{plan_2_name}}</p>
                        <p style="margin:8px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:28px;font-weight:600;color:#ffffff;line-height:36px;mso-line-height-rule:exactly;word-wrap:break-word;overflow-wrap:break-word;">{{plan_2_price}}</p>
                        <p style="margin:2px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:12px;font-weight:400;color:rgba(255,255,255,0.85);line-height:16px;mso-line-height-rule:exactly;">{{plan_2_period}}</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;color:#475569;line-height:22px;mso-line-height-rule:exactly;">
                        {{plan_2_features}}
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:0 12px 16px 12px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td align="center" bgcolor="{{highlight_color}}" style="background-color:{{highlight_color}};padding:8px 24px;">
                                    <a href="{{plan_2_cta_url}}" style="color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">{{plan_2_cta_text}}</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
        <!-- Plan 3 (standard) -->
        <td width="33%" valign="top" style="width:33%;padding:0 0 0 4px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                   style="width:100%;border-collapse:collapse;">
                <tr>
                    <td bgcolor="#f1f5f9" align="center"
                        style="background-color:#f1f5f9;padding:16px 12px;">
                        <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:14px;font-weight:600;color:#334155;line-height:20px;mso-line-height-rule:exactly;">{{plan_3_name}}</p>
                        <p style="margin:8px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:28px;font-weight:600;color:#0f172a;line-height:36px;mso-line-height-rule:exactly;word-wrap:break-word;overflow-wrap:break-word;">{{plan_3_price}}</p>
                        <p style="margin:2px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:12px;font-weight:400;color:#64748b;line-height:16px;mso-line-height-rule:exactly;">{{plan_3_period}}</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;color:#475569;line-height:22px;mso-line-height-rule:exactly;">
                        {{plan_3_features}}
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:0 12px 16px 12px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td align="center" bgcolor="#f1f5f9" style="background-color:#f1f5f9;padding:8px 24px;">
                                    <a href="{{plan_3_cta_url}}" style="color:#334155;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;font-size:13px;font-weight:600;text-decoration:none;">{{plan_3_cta_text}}</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
