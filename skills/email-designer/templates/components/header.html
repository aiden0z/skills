<!-- HEADER COMPONENT
     Compact banner with background color, logo (stacked above), title, and subtitle.
     Uses table layout with dual bgcolor/background-color declarations.
     Uses width="100%" — wrap in a parent td that controls max width.
     Variables: {{primary_color}}, {{title_color}}, {{title_placeholder}}, {{subtitle_placeholder}}
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width: 100%; border-collapse: collapse; table-layout: fixed;"
       bgcolor="{{primary_color}}">
    <tr>
        <td align="center" valign="middle" bgcolor="{{primary_color}}"
            style="background-color: {{primary_color}}; padding: 16px 24px;">

            <!-- Logo -->
            <img src="images/header_logo.png" width="40" height="40"
                 alt="Logo"
                 style="display: block; width: 40px; height: 40px; border: 0; margin: 0 auto;" />

            <!-- Spacer: logo to title -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td height="8" style="height: 8px; font-size: 1px; line-height: 8px; mso-line-height-rule: exactly;">&nbsp;</td>
                </tr>
            </table>

            <!-- Title -->
            <h1 style="margin: 0; padding: 0;
                       font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                       font-size: 22px; font-weight: 700; color: {{title_color}};
                       line-height: 28px; mso-line-height-rule: exactly;
                       text-align: center; word-wrap: break-word; overflow-wrap: break-word;">{{title_placeholder}}</h1>

            <!-- Spacer: title to subtitle -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td height="4" style="height: 4px; font-size: 1px; line-height: 4px; mso-line-height-rule: exactly;">&nbsp;</td>
                </tr>
            </table>

            <!-- Subtitle -->
            <p style="margin: 0; padding: 0;
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
                      font-size: 13px; font-weight: 400; color: {{title_color}};
                      line-height: 18px; mso-line-height-rule: exactly;
                      text-align: center; opacity: 0.85; word-wrap: break-word; overflow-wrap: break-word;">{{subtitle_placeholder}}</p>

        </td>
    </tr>
</table>
