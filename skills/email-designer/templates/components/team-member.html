<!-- TEAM MEMBER CARD COMPONENT
     Displays a team member with initial-letter avatar (no images needed).
     Uses a colored square with initials instead of circular avatar
     (border-radius not supported in Outlook).

     Variables:
       {{initials}}     — 1-2 letter initials (e.g., "JD")
       {{avatar_color}} — avatar background color (default #2563eb)
       {{name}}         — full name
       {{role}}         — job title / department
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="width:100%;border-collapse:collapse;">
    <tr>
        <!-- Avatar -->
        <td width="48" valign="top"
            style="width:48px;padding:0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td width="48" height="48" align="center" valign="middle"
                        bgcolor="{{avatar_color}}"
                        style="width:48px;height:48px;background-color:{{avatar_color}};
                               font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                               font-size:18px;font-weight:600;color:#ffffff;
                               line-height:48px;mso-line-height-rule:exactly;">
                        {{initials}}
                    </td>
                </tr>
            </table>
        </td>
        <!-- Name and role -->
        <td valign="middle" style="padding:0 0 0 12px;">
            <p style="margin:0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:14px;font-weight:600;color:#0f172a;
                      line-height:20px;mso-line-height-rule:exactly;">{{name}}</p>
            <p style="margin:2px 0 0 0;padding:0;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
                      font-size:12px;font-weight:400;color:#64748b;
                      line-height:16px;mso-line-height-rule:exactly;">{{role}}</p>
        </td>
    </tr>
</table>
